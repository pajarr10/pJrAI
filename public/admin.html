<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pJrAI — Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════════
       NEOBRUTALISM BASE
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #000000;
      --white:  #FFFFFF;
      --yellow: #FFD600;
      --red:    #FF3B30;
      --blue:   #0055FF;
      --green:  #00C853;
      --gray:   #F5F5F5;
      --border: 3px solid #000;
      --shadow: 5px 5px 0px #000;
      --shadow-sm: 3px 3px 0px #000;
      --radius: 0px;
      --font: 'Space Grotesk', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--gray);
      color: var(--black);
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════════════════
       LOGIN SCREEN
    ═══════════════════════════════════════════════════ */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--yellow);
      padding: 20px;
    }

    .login-box {
      background: var(--white);
      border: 4px solid var(--black);
      box-shadow: 8px 8px 0px var(--black);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-box h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }

    .login-box h1 span { background: var(--black); color: var(--yellow); padding: 0 6px; }

    .login-box p {
      color: #555;
      margin-bottom: 28px;
      font-size: 0.9rem;
    }

    .login-box label {
      display: block;
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .login-box input {
      width: 100%;
      padding: 12px 14px;
      border: 3px solid var(--black);
      background: var(--white);
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 500;
      outline: none;
      transition: box-shadow 0.1s;
      margin-bottom: 20px;
    }

    .login-box input:focus {
      box-shadow: var(--shadow-sm);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border: 3px solid var(--black);
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 0.08s, box-shadow 0.08s;
      box-shadow: var(--shadow-sm);
      background: var(--white);
      color: var(--black);
      text-decoration: none;
    }

    .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--black); }
    .btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px var(--black); }

    .btn--yellow { background: var(--yellow); }
    .btn--red    { background: var(--red);    color: var(--white); }
    .btn--blue   { background: var(--blue);   color: var(--white); }
    .btn--green  { background: var(--green);  }
    .btn--black  { background: var(--black);  color: var(--yellow); }
    .btn--full   { width: 100%; justify-content: center; }

    #loginError {
      display: none;
      background: var(--red);
      color: var(--white);
      border: 3px solid var(--black);
      padding: 10px 14px;
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    /* ═══════════════════════════════════════════════════
       DASHBOARD LAYOUT
    ═══════════════════════════════════════════════════ */
    #dashboard { display: none; min-height: 100vh; }

    /* ── Top bar ── */
    .topbar {
      background: var(--black);
      color: var(--yellow);
      border-bottom: 4px solid var(--black);
      padding: 0 24px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar__logo {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .topbar__logo em {
      font-style: normal;
      background: var(--yellow);
      color: var(--black);
      padding: 1px 6px;
      margin-right: 4px;
    }

    .topbar__right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar__status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--green);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .topbar .btn {
      padding: 6px 14px;
      font-size: 0.8rem;
    }

    /* ── Main container ── */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    @media (max-width: 700px) { .stats-grid { grid-template-columns: 1fr; } }

    .stat-card {
      background: var(--white);
      border: 3px solid var(--black);
      box-shadow: var(--shadow);
      padding: 22px 24px;
      position: relative;
    }

    .stat-card__label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 8px;
    }

    .stat-card__value {
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -2px;
    }

    .stat-card--yellow { background: var(--yellow); }
    .stat-card--blue   { background: var(--blue); color: var(--white); }
    .stat-card--blue .stat-card__label { color: rgba(255,255,255,0.7); }
    .stat-card--green  { background: var(--green); }

    .stat-card__icon {
      position: absolute;
      top: 16px; right: 20px;
      font-size: 2rem;
      opacity: 0.25;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      border-left: 5px solid var(--black);
      padding-left: 12px;
    }

    /* ── Search bar ── */
    .search-bar {
      display: flex;
      gap: 0;
    }

    .search-bar input {
      padding: 10px 14px;
      border: 3px solid var(--black);
      border-right: none;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 500;
      outline: none;
      width: 220px;
      background: var(--white);
    }

    .search-bar button {
      padding: 10px 16px;
      background: var(--black);
      color: var(--yellow);
      border: 3px solid var(--black);
      font-family: var(--font);
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      text-transform: uppercase;
    }

    .search-bar button:hover { background: #222; }

    /* ── Sessions table ── */
    .table-wrap {
      background: var(--white);
      border: 3px solid var(--black);
      box-shadow: var(--shadow);
      overflow-x: auto;
      margin-bottom: 28px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--black);
      color: var(--yellow);
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 2px solid var(--black);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--yellow); cursor: pointer; }

    tbody td {
      padding: 12px 16px;
      font-size: 0.88rem;
      font-weight: 500;
      vertical-align: middle;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border: 2px solid var(--black);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge--blue  { background: var(--blue);  color: var(--white); }
    .badge--green { background: var(--green); }
    .badge--yellow{ background: var(--yellow); }
    .badge--red   { background: var(--red);   color: var(--white); }

    /* ── Empty state ── */
    .empty-state {
      padding: 48px 24px;
      text-align: center;
      color: #888;
    }

    .empty-state__icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state__text { font-weight: 600; font-size: 1rem; }

    /* ── Loading spinner ── */
    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 32px;
      font-weight: 700;
      font-size: 0.9rem;
      color: #555;
    }

    .loader__dots span {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--black);
      margin: 0 2px;
      animation: bounce 0.8s infinite;
    }

    .loader__dots span:nth-child(2) { animation-delay: 0.15s; }
    .loader__dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* ═══════════════════════════════════════════════════
       CHAT DETAIL PANEL (slide-in)
    ═══════════════════════════════════════════════════ */
    #chatPanel {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 100%;
      max-width: 560px;
      height: 100vh;
      background: var(--white);
      border-left: 4px solid var(--black);
      box-shadow: -8px 0 0 var(--black);
      z-index: 200;
      flex-direction: column;
      overflow: hidden;
    }

    #chatPanel.is-open { display: flex; }

    .panel-header {
      background: var(--black);
      color: var(--white);
      padding: 14px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 3px solid var(--black);
      flex-shrink: 0;
    }

    .panel-header__title {
      font-size: 1rem;
      font-weight: 700;
    }

    .panel-header__meta {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 3px;
      word-break: break-all;
    }

    .panel-close {
      background: var(--red);
      border: 2px solid var(--white);
      color: var(--white);
      width: 32px; height: 32px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .panel-close:hover { background: #cc0000; }

    .panel-info {
      padding: 12px 20px;
      border-bottom: 2px solid #eee;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      flex-shrink: 0;
      font-size: 0.78rem;
      background: #fafafa;
    }

    .panel-info__item { display: flex; flex-direction: column; gap: 2px; }
    .panel-info__item strong { font-size: 0.7rem; text-transform: uppercase; color: #777; }
    .panel-info__item span   { font-weight: 600; word-break: break-all; }

    .panel-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Chat bubbles in panel */
    .pmsg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 88%;
    }

    .pmsg--user { align-self: flex-end; align-items: flex-end; }
    .pmsg--ai   { align-self: flex-start; align-items: flex-start; }

    .pmsg__label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
    }

    .pmsg__bubble {
      padding: 12px 16px;
      border: 2px solid var(--black);
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .pmsg--user .pmsg__bubble {
      background: var(--black);
      color: var(--yellow);
      box-shadow: 3px 3px 0px rgba(0,0,0,0.3);
    }

    .pmsg--ai .pmsg__bubble {
      background: var(--white);
      box-shadow: 3px 3px 0px var(--black);
    }

    .pmsg__time {
      font-size: 0.68rem;
      color: #999;
      font-weight: 600;
    }

    /* ── Overlay ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 199;
    }

    #overlay.is-open { display: block; }

    /* ── Refresh btn ── */
    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Toast notification ── */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--black);
      color: var(--yellow);
      border: 3px solid var(--black);
      padding: 12px 24px;
      font-weight: 700;
      font-size: 0.9rem;
      box-shadow: var(--shadow);
      z-index: 999;
      transition: transform 0.25s;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Error banner ── */
    .error-banner {
      background: var(--red);
      color: var(--white);
      border: 3px solid var(--black);
      padding: 12px 18px;
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    /* ── Truncate ── */
    .truncate { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

    /* ── Mobile tweaks ── */
    @media (max-width: 600px) {
      .main { padding: 16px 14px; }
      .stat-card__value { font-size: 2rem; }
      #chatPanel { max-width: 100%; border-left: none; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════ LOGIN ═══════════ -->
<div id="loginScreen">
  <div class="login-box">
    <h1><span>pJr</span>AI</h1>
    <p>Admin Panel — masukkan admin key untuk lanjut.</p>
    <div id="loginError">❌ Admin key salah. Coba lagi.</div>
    <label for="adminKeyInput">Admin Key</label>
    <input type="password" id="adminKeyInput" placeholder="••••••••••••" autocomplete="current-password" />
    <button class="btn btn--black btn--full" id="loginBtn">MASUK →</button>
  </div>
</div>

<!-- ═══════════════════════════════════════ DASHBOARD ══════ -->
<div id="dashboard">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar__logo"><em>pJr</em>AI Admin</div>
    <div class="topbar__right">
      <span class="topbar__status"><span class="status-dot"></span> LIVE</span>
      <button class="btn btn--yellow" id="refreshBtn">↺ Refresh</button>
      <button class="btn btn--red"    id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="main">

    <!-- Error Banner -->
    <div id="errorBanner" class="error-banner" style="display:none;"></div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card stat-card--yellow">
        <div class="stat-card__icon">👥</div>
        <div class="stat-card__label">Total Sesi</div>
        <div class="stat-card__value" id="statSessions">—</div>
      </div>
      <div class="stat-card stat-card--blue">
        <div class="stat-card__icon">💬</div>
        <div class="stat-card__label">Total Pesan</div>
        <div class="stat-card__value" id="statMessages">—</div>
      </div>
      <div class="stat-card stat-card--green">
        <div class="stat-card__icon">🟢</div>
        <div class="stat-card__label">Aktif Hari Ini</div>
        <div class="stat-card__value" id="statActive">—</div>
      </div>
    </div>

    <!-- Sessions list -->
    <div class="section-header">
      <div class="section-title">Semua Sesi</div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Cari session ID…" />
        <button id="searchBtn">CARI</button>
      </div>
    </div>

    <div class="table-wrap">
      <div id="sessionsLoader" class="loader">
        <span>Memuat data</span>
        <div class="loader__dots"><span></span><span></span><span></span></div>
      </div>
      <table id="sessionsTable" style="display:none;">
        <thead>
          <tr>
            <th>#</th>
            <th>Session ID</th>
            <th>IP Address</th>
            <th>User Agent</th>
            <th>Jumlah Chat</th>
            <th>Last Active</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="sessionsTbody"></tbody>
      </table>
      <div id="sessionsEmpty" class="empty-state" style="display:none;">
        <div class="empty-state__icon">📭</div>
        <div class="empty-state__text">Belum ada sesi yang tersimpan.</div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /dashboard -->

<!-- ═══════════════════════════════════════ OVERLAY ════════ -->
<div id="overlay"></div>

<!-- ═══════════════════════════════════════ CHAT PANEL ═════ -->
<div id="chatPanel">
  <div class="panel-header">
    <div>
      <div class="panel-header__title" id="panelTitle">Detail Chat</div>
      <div class="panel-header__meta" id="panelMeta"></div>
    </div>
    <button class="panel-close" id="panelClose">✕</button>
  </div>
  <div class="panel-info" id="panelInfo"></div>
  <div class="panel-messages" id="panelMessages">
    <div class="loader">
      <span>Memuat chat</span>
      <div class="loader__dots"><span></span><span></span><span></span></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════ TOAST ══════════ -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   pJrAI Admin Panel — vanilla JS
═══════════════════════════════════════════════════════════ */
(function () {
  "use strict";

  /* ── Config ─────────────────────────────────────────────── */
  var BACKEND = "";   // same-origin; change if using separate backend domain

  /* ── State ──────────────────────────────────────────────── */
  var adminKey     = "";
  var allSessions  = [];

  /* ── DOM refs ───────────────────────────────────────────── */
  var loginScreen   = document.getElementById("loginScreen");
  var dashboard     = document.getElementById("dashboard");
  var adminKeyInput = document.getElementById("adminKeyInput");
  var loginBtn      = document.getElementById("loginBtn");
  var loginError    = document.getElementById("loginError");
  var logoutBtn     = document.getElementById("logoutBtn");
  var refreshBtn    = document.getElementById("refreshBtn");
  var errorBanner   = document.getElementById("errorBanner");
  var statSessions  = document.getElementById("statSessions");
  var statMessages  = document.getElementById("statMessages");
  var statActive    = document.getElementById("statActive");
  var sessionsLoader= document.getElementById("sessionsLoader");
  var sessionsTable = document.getElementById("sessionsTable");
  var sessionsTbody = document.getElementById("sessionsTbody");
  var sessionsEmpty = document.getElementById("sessionsEmpty");
  var searchInput   = document.getElementById("searchInput");
  var searchBtn     = document.getElementById("searchBtn");
  var chatPanel     = document.getElementById("chatPanel");
  var overlay       = document.getElementById("overlay");
  var panelClose    = document.getElementById("panelClose");
  var panelTitle    = document.getElementById("panelTitle");
  var panelMeta     = document.getElementById("panelMeta");
  var panelInfo     = document.getElementById("panelInfo");
  var panelMessages = document.getElementById("panelMessages");
  var toast         = document.getElementById("toast");

  /* ── Helpers ────────────────────────────────────────────── */
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(function () { toast.classList.remove("show"); }, 2500);
  }

  function showError(msg) {
    errorBanner.textContent = "⚠ " + msg;
    errorBanner.style.display = "block";
    setTimeout(function () { errorBanner.style.display = "none"; }, 5000);
  }

  function formatDate(iso) {
    if (!iso) return "—";
    var d = new Date(iso);
    return d.toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric" }) +
           " " + d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
  }

  function escHtml(s) {
    var d = document.createElement("div");
    d.textContent = String(s);
    return d.innerHTML;
  }

  function truncate(str, n) {
    if (!str) return "—";
    return str.length > n ? str.slice(0, n) + "…" : str;
  }

  async function apiFetch(path) {
    var res = await fetch(BACKEND + path, {
      headers: { "x-admin-key": adminKey }
    });
    if (res.status === 401) throw new Error("Unauthorized");
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  /* ── Login ──────────────────────────────────────────────── */
  function attemptLogin() {
    var key = adminKeyInput.value.trim();
    if (!key) return;

    /* We verify the key by hitting /api/stats and checking for 401 */
    adminKey = key;
    loginBtn.textContent = "MEMERIKSA…";
    loginBtn.disabled = true;

    apiFetch("/api/stats")
      .then(function () {
        loginError.style.display = "none";
        loginScreen.style.display = "none";
        dashboard.style.display  = "block";
        loadDashboard();
      })
      .catch(function (err) {
        adminKey = "";
        loginError.style.display = "block";
        loginError.textContent   = err.message === "Unauthorized"
          ? "❌ Admin key salah."
          : "❌ Tidak bisa menghubungi server. Periksa URL backend.";
      })
      .finally(function () {
        loginBtn.textContent = "MASUK →";
        loginBtn.disabled    = false;
      });
  }

  loginBtn.addEventListener("click", attemptLogin);
  adminKeyInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") attemptLogin();
  });

  /* ── Logout ─────────────────────────────────────────────── */
  logoutBtn.addEventListener("click", function () {
    adminKey   = "";
    allSessions= [];
    dashboard.style.display   = "none";
    loginScreen.style.display = "flex";
    adminKeyInput.value       = "";
  });

  /* ── Refresh ────────────────────────────────────────────── */
  refreshBtn.addEventListener("click", function () {
    loadDashboard();
    showToast("✓ Data diperbarui");
  });

  /* ── Load dashboard ─────────────────────────────────────── */
  function loadDashboard() {
    loadStats();
    loadSessions();
  }

  /* ── Stats ──────────────────────────────────────────────── */
  function loadStats() {
    statSessions.textContent = "…";
    statMessages.textContent = "…";
    statActive.textContent   = "…";

    apiFetch("/api/stats")
      .then(function (data) {
        statSessions.textContent = data.totalSessions  || 0;
        statMessages.textContent = data.totalMessages  || 0;
        statActive.textContent   = data.activeToday    || 0;
      })
      .catch(function (err) { showError("Gagal memuat stats: " + err.message); });
  }

  /* ── Sessions list ──────────────────────────────────────── */
  function loadSessions() {
    sessionsLoader.style.display = "flex";
    sessionsTable.style.display  = "none";
    sessionsEmpty.style.display  = "none";

    apiFetch("/api/sessions")
      .then(function (data) {
        allSessions = data.sessions || [];
        renderSessions(allSessions);
      })
      .catch(function (err) {
        sessionsLoader.style.display = "none";
        showError("Gagal memuat sesi: " + err.message);
      });
  }

  function renderSessions(sessions) {
    sessionsLoader.style.display = "none";

    if (!sessions.length) {
      sessionsEmpty.style.display = "block";
      sessionsTable.style.display = "none";
      return;
    }

    sessionsEmpty.style.display = "none";
    sessionsTable.style.display = "table";

    sessionsTbody.innerHTML = sessions.map(function (s, i) {
      var chatBadge = s.chatCount > 0
        ? '<span class="badge badge--blue">' + s.chatCount + '</span>'
        : '<span class="badge">0</span>';

      var ua = s.userAgent || "—";
      var uaShort = ua.length > 45 ? ua.slice(0, 45) + "…" : ua;

      return [
        "<tr data-id=\"" + escHtml(s.sessionId) + "\">",
        "<td>" + (i + 1) + "</td>",
        "<td><code style=\"font-size:0.78rem;font-weight:600;\">" + escHtml(truncate(s.sessionId, 24)) + "</code></td>",
        "<td>" + escHtml(s.ip || "—") + "</td>",
        "<td title=\"" + escHtml(ua) + "\"><span class=\"truncate\" style=\"max-width:180px;\">" + escHtml(uaShort) + "</span></td>",
        "<td>" + chatBadge + "</td>",
        "<td style=\"white-space:nowrap;font-size:0.8rem;\">" + escHtml(formatDate(s.lastActive)) + "</td>",
        "<td><button class=\"btn btn--yellow\" style=\"padding:6px 14px;font-size:0.78rem;\" onclick=\"openChat('" + escHtml(s.sessionId) + "')\">LIHAT →</button></td>",
        "</tr>"
      ].join("");
    }).join("");

    /* Row click → open chat panel */
    sessionsTbody.querySelectorAll("tr").forEach(function (row) {
      row.addEventListener("click", function (e) {
        if (e.target.tagName === "BUTTON") return;
        openChat(row.getAttribute("data-id"));
      });
    });
  }

  /* ── Search ─────────────────────────────────────────────── */
  searchBtn.addEventListener("click", doSearch);
  searchInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") doSearch();
  });

  function doSearch() {
    var q = searchInput.value.trim().toLowerCase();
    if (!q) { renderSessions(allSessions); return; }
    var filtered = allSessions.filter(function (s) {
      return (s.sessionId || "").toLowerCase().includes(q) ||
             (s.ip        || "").toLowerCase().includes(q);
    });
    renderSessions(filtered);
  }

  /* ── Chat Panel ─────────────────────────────────────────── */
  window.openChat = function (sessionId) {
    panelTitle.textContent    = "Detail Chat";
    panelMeta.textContent     = sessionId;
    panelInfo.innerHTML       = "";
    panelMessages.innerHTML   = [
      '<div class="loader">',
      '<span>Memuat chat</span>',
      '<div class="loader__dots"><span></span><span></span><span></span></div>',
      '</div>'
    ].join("");

    chatPanel.classList.add("is-open");
    overlay.classList.add("is-open");

    apiFetch("/api/session/" + encodeURIComponent(sessionId))
      .then(function (data) {
        var s = data.session || {};
        var messages = data.messages || [];

        /* Info bar */
        panelInfo.innerHTML = [
          infoItem("IP",           s.ip       || "—"),
          infoItem("First Visit",  formatDate(s.createdAt)),
          infoItem("Last Active",  formatDate(s.lastActive)),
          infoItem("Total Pesan",  messages.length),
        ].join("");

        /* Messages */
        if (!messages.length) {
          panelMessages.innerHTML = [
            '<div class="empty-state">',
            '<div class="empty-state__icon">💬</div>',
            '<div class="empty-state__text">Belum ada chat untuk sesi ini.</div>',
            '</div>'
          ].join("");
          return;
        }

        panelMessages.innerHTML = messages.map(function (m) {
          var role = m.role === "user" ? "user" : "ai";
          var label = role === "user" ? "👤 USER" : "🤖 AI";
          return [
            '<div class="pmsg pmsg--' + role + '">',
            '  <div class="pmsg__label">' + label + '</div>',
            '  <div class="pmsg__bubble">' + escHtml(m.text || "") + '</div>',
            '  <div class="pmsg__time">' + escHtml(formatDate(m.time)) + '</div>',
            '</div>'
          ].join("");
        }).join("");

        /* Scroll to bottom */
        panelMessages.scrollTop = panelMessages.scrollHeight;
      })
      .catch(function (err) {
        panelMessages.innerHTML = '<div class="error-banner">Gagal memuat chat: ' + escHtml(err.message) + '</div>';
      });
  };

  function infoItem(label, value) {
    return [
      '<div class="panel-info__item">',
      '<strong>' + escHtml(label) + '</strong>',
      '<span>' + escHtml(String(value)) + '</span>',
      '</div>'
    ].join("");
  }

  function closePanel() {
    chatPanel.classList.remove("is-open");
    overlay.classList.remove("is-open");
  }

  panelClose.addEventListener("click", closePanel);
  overlay.addEventListener("click", closePanel);

})();
</script>
</body>
</html>
